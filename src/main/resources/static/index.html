<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spring Boot Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        /* Простые стили */
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 5px; }
        .system { color: grey; font-style: italic; }
    </style>
</head>
<body>
<div>
    <h2>Spring Boot WebSocket Chat</h2>
    <div id="nameSection">
        <input type="text" id="username" placeholder="Your name" />
        <button id="connectBtn">Connect</button>
    </div>
    <div id="chatSection" style="display: none;">
        <div id="messages"></div>
        <input type="text" id="message" placeholder="Type a message..." />
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    let stompClient = null;
    let username = null;

    const connectBtn = document.getElementById('connectBtn');
    const connectSection = document.getElementById('nameSection');
    const chatSection = document.getElementById('chatSection');
    const messagesDiv = document.getElementById('messages');
    const usernameInput = document.getElementById('username');
    const messageInput = document.getElementById('message');
    const sendBtn = document.getElementById('sendBtn');

    connectBtn.addEventListener('click', () => {
        username = usernameInput.value.trim();
        if (username) {
            connect();
            connectSection.style.display = 'none';
            chatSection.style.display = 'block';
        }
    });

    sendBtn.addEventListener('click', () => {
        const content = messageInput.value.trim();
        if (content && stompClient) {
            const chatMessage = {
                sender: username,
                content: content,
                type: 'CHAT'
            };
            stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));
            messageInput.value = '';
        }
    });

    function connect() {
        const socket = new SockJS('http://localhost:8080/chat-websocket');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, onConnected, onError);
    }

    function onConnected() {
        // Подписываемся на публичный канал, чтобы получать все сообщения
        stompClient.subscribe('/topic/public', onMessageReceived);

        // Сообщаем серверу, что новый пользователь присоединился
        const chatMessage = {
            sender: username,
            content: username + ' joined the chat!',
            type: 'JOIN'
        };
        stompClient.send("/app/chat.addUser", {}, JSON.stringify(chatMessage));
    }

    function onError(error) {
        console.error("WebSocket error: ", error);
        alert("Could not connect to WebSocket server.");
    }

    function onMessageReceived(payload) {
        const message = JSON.parse(payload.body);
        const messageElement = document.createElement('div');
        messageElement.classList.add('message');

        if (message.type === 'JOIN' || message.type === 'LEAVE') {
            messageElement.classList.add('system');
            messageElement.textContent = message.content;
        } else {
            messageElement.innerHTML = `<b>${message.sender}:</b> ${message.content}`;
        }
        messagesDiv.appendChild(messageElement);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
</script>
</body>
</html>
